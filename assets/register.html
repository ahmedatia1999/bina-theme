<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>bina-7</title>
    <!-- Stylesheets -->
    <link rel="icon" href="images/favicon.svg">
    <link href="css/style.css" rel="stylesheet">
    <!-- Responsive -->
    <link href="css/responsive.css" rel="stylesheet">
    <!--[if lt IE 9]><script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script><![endif]-->
    <!--[if lt IE 9]><script src="js/respond.js"></script><![endif]-->
    <script src="js/jquery-3.2.1.min.js"></script>
</head>

<body>

    <div class="main-wrapper">

        <section class="section_sign">
            <div class="container-sign">
                <div class="thumb-sign wow fadeInUp">
                    <figure class="logo-sign"><img src="images/logo.svg" alt="Logo" /></figure>
                    <figure class="image-sign">
                        <img src="images/thumb-register.svg" alt="Login" />
                    </figure>
                </div>
                <div class="cont-sign">
                    <div class="head-sign">
                        <h1>Create an account</h1>
                        <p>Get started by creating your account in just a few steps.</p>
                    </div>
                    <form class="form-sign wow fadeInUp">
                        <div class="form-group">
                            <label>Full name</label>
                            <input type="text" class="form-control" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter email address">
                        </div>
                        <div class="form-group">
                            <label>Mobile number</label>
                            <input type="number" class="form-control" placeholder="Enter email address">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                            <span class="toggle-password"><i class="fa-regular fa-eye"></i></span>
                        </div>
                        <div class="form-group form-check">
                            <input id="remember" type="checkbox" class="form-check-input">
                            <label for="remember" class="form-check-label">I agree to the Terms & Conditions and Privacy Policy.</label>
                        </div>
                        <div class="form-group">
                            <button class="btn-site" type="submit"><span>Create an account</span></button>
                            <p class="ph-create-sign"><a href="login.html">Log in</a> Do you have an account?</p>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <!--section_home-->

    </div>
    <!--main-wrapper-->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/all.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/wow.js"></script>
    <script src="js/jquery.easing.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        new WOW().init();
        
        $(document).ready(function () {
            $('.toggle-password').on('click', function () {
                const input = $('#password');

                if (input.attr('type') === 'password') {
                    input.attr('type', 'text');
                    $(this).html('<i class="fa-regular fa-eye-slash"></i>');
                } else {
                input.attr('type', 'password');
                    $(this).html('<i class="fa-regular fa-eye"></i>');
                }
            });
        });
    </script>


</body>

</html>
